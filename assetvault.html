<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssetVault — Laptop Inventory</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230E8A7A'/%3E%3Cpath fill='white' d='M22.3 7.8a5.5 5.5 0 00-6.6 7l-7.5 7.5a1.8 1.8 0 002.5 2.5l7.5-7.5a5.5 5.5 0 007-6.6l-3 3-2-0.5L19.7 11l3-3z'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── THEMES ── */
:root, [data-theme="light"] {
  --blob1: #a8edea;
  --blob2: #b3d4f5;
  --blob3: #d4b8f0;
  --blob4: #f0d4b8;
  --bg-base: #eef2f7;
  --glass: rgba(255,255,255,0.55);
  --glass-hover: rgba(255,255,255,0.72);
  --glass-strong: rgba(255,255,255,0.80);
  --glass-modal: rgba(255,255,255,0.82);
  --glass-input: rgba(255,255,255,0.5);
  --glass-input-focus: rgba(255,255,255,0.8);
  --border: rgba(255,255,255,0.7);
  --border2: rgba(200,210,230,0.6);
  --border3: rgba(180,195,220,0.5);
  --text: #1a1f2e;
  --text2: #4a5270;
  --text3: #8892a8;
  --accent: #0d7a6b;
  --accent-light: rgba(13,122,107,0.12);
  --accent-text: #fff;
  --green: #1a7a35;
  --green-bg: rgba(26,122,53,0.1);
  --blue: #1a5fc4;
  --blue-bg: rgba(26,95,196,0.1);
  --amber: #8a5e00;
  --amber-bg: rgba(138,94,0,0.1);
  --red: #b83030;
  --red-bg: rgba(184,48,48,0.1);
  --shadow: 0 8px 32px rgba(100,120,160,0.12);
  --shadow-sm: 0 2px 12px rgba(100,120,160,0.08);
  --radius: 10px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --blur: blur(20px);
  --blur-sm: blur(12px);
}

[data-theme="dark"] {
  --blob1: #1a3a4a;
  --blob2: #1e2f52;
  --blob3: #2d1f47;
  --blob4: #3a2a14;
  --bg-base: #0a0e1a;
  --glass: rgba(255,255,255,0.04);
  --glass-hover: rgba(255,255,255,0.07);
  --glass-strong: rgba(255,255,255,0.08);
  --glass-modal: rgba(15,20,35,0.85);
  --glass-input: rgba(255,255,255,0.05);
  --glass-input-focus: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.12);
  --border3: rgba(255,255,255,0.06);
  --text: #e8edf8;
  --text2: #8892b0;
  --text3: #4a5270;
  --accent: #2dd4bf;
  --accent-light: rgba(45,212,191,0.1);
  --accent-text: #0a2520;
  --green: #3fb950;
  --green-bg: rgba(63,185,80,0.1);
  --blue: #58a6ff;
  --blue-bg: rgba(88,166,255,0.1);
  --amber: #d29922;
  --amber-bg: rgba(210,153,34,0.1);
  --red: #f85149;
  --red-bg: rgba(248,81,73,0.1);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.3);
}

/* ── BODY & BACKGROUND ── */
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-base);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.6;
  overflow-x: hidden;
}

.bg-canvas {
  position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
}
.blob {
  position: absolute; border-radius: 50%;
  filter: blur(80px); opacity: 0.55;
  animation: drift 18s ease-in-out infinite;
}
[data-theme="dark"] .blob { opacity: 0.35; }
.blob-1 { width: 600px; height: 600px; background: var(--blob1); top: -150px; left: -150px; animation-delay: 0s; }
.blob-2 { width: 500px; height: 500px; background: var(--blob2); top: 20%; right: -100px; animation-delay: -6s; }
.blob-3 { width: 450px; height: 450px; background: var(--blob3); bottom: -100px; left: 30%; animation-delay: -12s; }
.blob-4 { width: 400px; height: 400px; background: var(--blob4); bottom: 10%; right: 20%; animation-delay: -4s; }

@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(30px,-40px) scale(1.05); }
  66%      { transform: translate(-20px,20px) scale(0.97); }
}

/* ── LAYOUT ── */
.app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

/* ── HEADER ── */
.header {
  background: var(--glass);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex; align-items: center; justify-content: space-between;
  height: 58px; position: sticky; top: 0; z-index: 100;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.brand-icon {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(13,122,107,0.3);
}
.brand-icon svg { width: 15px; height: 15px; fill: white; }
.brand-name {
  font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.3px;
}
.brand-name span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 8px; }

/* ── GLASS BUTTON ── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 13px; border-radius: var(--radius);
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
  background: var(--glass);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border: 1px solid var(--border2);
  color: var(--text2);
  transition: all 0.18s;
  box-shadow: var(--shadow-sm);
}
.btn:hover { background: var(--glass-hover); color: var(--text); border-color: var(--border2); }
.btn-primary {
  background: var(--accent); border-color: transparent;
  color: var(--accent-text); font-weight: 600;
  box-shadow: 0 2px 12px rgba(13,122,107,0.25);
}
[data-theme="dark"] .btn-primary { box-shadow: 0 2px 12px rgba(45,212,191,0.2); }
.btn-primary:hover { opacity: 0.88; color: var(--accent-text); }
.btn-danger { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.btn-danger:hover { background: var(--red-bg); opacity: 0.85; }
.btn-sm { padding: 3px 9px; font-size: 11px; }
.btn svg { width: 13px; height: 13px; }
.btn-icon {
  width: 28px; height: 28px; padding: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
}
.btn-icon svg { width: 14px; height: 14px; }

/* ── THEME TOGGLE ── */
.theme-toggle {
  display: flex; align-items: center; gap: 6px; cursor: pointer;
  padding: 5px 10px; border-radius: var(--radius);
  background: var(--glass); backdrop-filter: var(--blur-sm);
  border: 1px solid var(--border2); color: var(--text2);
  font-size: 12px; font-weight: 500; transition: all 0.18s;
  user-select: none;
}
.theme-toggle:hover { background: var(--glass-hover); color: var(--text); }
.toggle-track {
  width: 30px; height: 16px; border-radius: 8px;
  background: var(--border2); position: relative;
  transition: background 0.2s; flex-shrink: 0;
}
[data-theme="dark"] .toggle-track { background: var(--accent); }
.toggle-knob {
  position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px; border-radius: 50%;
  background: #fff; transition: transform 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
[data-theme="dark"] .toggle-knob { transform: translateX(14px); }
.toggle-sun { font-size: 12px; }
.toggle-moon { font-size: 12px; display: none; }
[data-theme="dark"] .toggle-sun { display: none; }
[data-theme="dark"] .toggle-moon { display: inline; }

/* ── MAIN ── */
.main { padding: 22px 28px; flex: 1; }

/* ── STATS ── */
.stats-row {
  display: grid; grid-template-columns: repeat(6,1fr);
  gap: 10px; margin-bottom: 20px;
}
@media(max-width:900px){ .stats-row { grid-template-columns: repeat(3,1fr); } }
.stat-card {
  background: var(--glass);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
  transition: background 0.2s;
}
.stat-card:hover { background: var(--glass-hover); }
.stat-lbl { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.stat-val { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 500; line-height: 1; }
.c-total  { color: var(--text); }
.c-deploy { color: var(--green); }
.c-spare  { color: var(--blue); }
.c-repair { color: var(--amber); }
.c-retire { color: var(--text3); }
.c-lost   { color: var(--red); }

/* ── TOOLBAR ── */
.toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.search-wrap { position: relative; flex: 1; min-width: 180px; }
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 13px; height: 13px; fill: var(--text3); pointer-events: none;
}
.search-input {
  width: 100%;
  background: var(--glass-input);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 7px 12px 7px 30px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 12px; outline: none;
  transition: all 0.18s;
}
.search-input:focus { background: var(--glass-input-focus); border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }
.filter-select {
  background: var(--glass-input);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 7px 12px; color: var(--text2);
  font-family: 'Inter', sans-serif; font-size: 12px; outline: none; cursor: pointer;
  transition: all 0.18s;
}
.filter-select:focus { border-color: var(--accent); }

/* ── COUNT BAR ── */
.count-bar {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text3); margin-bottom: 8px;
}

/* ── TABLE ── */
.table-wrap {
  background: var(--glass);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  overflow: auto;
  box-shadow: var(--shadow);
}
table { width: 100%; border-collapse: collapse; min-width: 1100px; }
thead th {
  padding: 9px 13px; text-align: left;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500;
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.7px;
  border-bottom: 1px solid var(--border2);
  white-space: nowrap; user-select: none; cursor: pointer;
  background: var(--glass-strong);
  transition: color 0.15s;
}
thead th:hover { color: var(--text2); }
thead th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }
thead th.no-sort { cursor: default; }
tbody tr { border-bottom: 1px solid var(--border3); transition: background 0.12s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--glass-hover); }
td { padding: 10px 13px; color: var(--text); vertical-align: middle; font-size: 12px; }
td.mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); }
td.date-cell { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); white-space: nowrap; }
.row-actions { display: flex; gap: 5px; }
.empty-state { text-align: center; padding: 56px 20px; color: var(--text3); }
.empty-state svg { width: 36px; height: 36px; fill: var(--text3); margin-bottom: 10px; opacity: 0.3; }

/* ── BADGES ── */
.badge {
  display: inline-block; padding: 2px 9px; border-radius: 20px;
  font-size: 10px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.3px; white-space: nowrap; border: 1px solid transparent;
}
.badge-deploy { background: var(--green-bg); color: var(--green); border-color: rgba(26,122,53,0.2); }
[data-theme="dark"] .badge-deploy { border-color: rgba(63,185,80,0.2); }
.badge-spare  { background: var(--blue-bg); color: var(--blue); border-color: rgba(26,95,196,0.2); }
[data-theme="dark"] .badge-spare { border-color: rgba(88,166,255,0.2); }
.badge-retire { background: var(--glass); color: var(--text3); border-color: var(--border2); }
.badge-repair { background: var(--amber-bg); color: var(--amber); border-color: rgba(138,94,0,0.2); }
[data-theme="dark"] .badge-repair { border-color: rgba(210,153,34,0.2); }
.badge-lost   { background: var(--red-bg); color: var(--red); border-color: rgba(184,48,48,0.2); }
[data-theme="dark"] .badge-lost { border-color: rgba(248,81,73,0.2); }

/* ── MODAL OVERLAY ── */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
  background: rgba(10,14,26,0.4);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
[data-theme="light"] .overlay { background: rgba(180,195,220,0.3); }
.overlay.open { display: flex; }

.modal {
  background: var(--glass-modal);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border2);
  border-radius: var(--radius-xl);
  width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal-header {
  padding: 18px 22px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
.modal-close {
  background: var(--glass); border: 1px solid var(--border2); color: var(--text3);
  cursor: pointer; padding: 0; width: 26px; height: 26px;
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--glass-hover); color: var(--text); }
.modal-close svg { width: 14px; height: 14px; }
.modal-body { padding: 18px 22px; }
.modal-footer {
  padding: 14px 22px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}

/* DATE STRIP */
.date-strip {
  display: flex; gap: 20px; margin-bottom: 16px;
  padding: 9px 13px; background: var(--accent-light);
  border-radius: var(--radius); border: 1px solid rgba(13,122,107,0.2);
}
[data-theme="dark"] .date-strip { border-color: rgba(45,212,191,0.15); }
.date-strip-item { display: flex; flex-direction: column; gap: 2px; }
.date-strip-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--accent); opacity: 0.7; }
.date-strip-value { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); }

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1/-1; }
.form-label { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; }
.form-input, .form-select {
  background: var(--glass-input);
  backdrop-filter: var(--blur-sm);
  border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 8px 11px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 12px; outline: none;
  transition: all 0.18s; width: 100%;
}
.form-input:focus, .form-select:focus { background: var(--glass-input-focus); border-color: var(--accent); }
.form-input::placeholder { color: var(--text3); }

/* IMPORT AREA */
.import-area {
  border: 1.5px dashed var(--border2); border-radius: var(--radius-lg);
  padding: 28px; text-align: center; color: var(--text3);
  cursor: pointer; transition: all 0.18s;
  margin-bottom: 14px; display: block;
  background: var(--glass-input);
}
.import-area:hover { border-color: var(--accent); color: var(--text2); background: var(--glass-hover); }
.import-area svg { width: 28px; height: 28px; fill: currentColor; margin-bottom: 8px; }
.import-area input { display: none; }

/* TOAST */
.toast {
  position: fixed; bottom: 22px; right: 22px; z-index: 999;
  background: var(--glass-modal);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 11px 16px;
  color: var(--text); font-size: 12px;
  transform: translateY(70px); opacity: 0;
  transition: all 0.25s; display: flex; align-items: center; gap: 9px;
  box-shadow: var(--shadow);
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.toast-dot.err { background: var(--red); }

/* DIVIDER */
.header-divider { width: 1px; height: 18px; background: var(--border2); }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<!-- BACKGROUND BLOBS -->
<div class="bg-canvas">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

<div class="app">
<!-- HEADER -->
<header class="header">
  <div class="header-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M4 6h16v10H4zm-2 12h20v2H2zM8 8h8v6H8z"/></svg>
    </div>
    <span class="brand-name">Asset<span>Vault</span></span>
  </div>
  <div class="header-right">
    <div class="theme-toggle" onclick="toggleTheme()">
      <span class="toggle-sun">☀️</span>
      <span class="toggle-moon">🌙</span>
      <div class="toggle-track"><div class="toggle-knob"></div></div>
      <span id="themeLabel">Light</span>
    </div>
    <div class="header-divider"></div>
    <button class="btn" onclick="openImportModal()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
      Import
    </button>
    <button class="btn" onclick="exportCSV()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 12v7H5v-7H3v7a2 2 0 002 2h14a2 2 0 002-2v-7zm-6-1.586l2.293 2.293 1.414-1.414L12 7.586l-4.707 4.707 1.414 1.414L11 10.414V18h2z"/></svg>
      CSV
    </button>
    <button class="btn" onclick="exportJSON()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 12v7H5v-7H3v7a2 2 0 002 2h14a2 2 0 002-2v-7zm-6-1.586l2.293 2.293 1.414-1.414L12 7.586l-4.707 4.707 1.414 1.414L11 10.414V18h2z"/></svg>
      JSON
    </button>
    <div class="header-divider"></div>
    <button class="btn btn-primary" onclick="openAddModal()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>
      Add Laptop
    </button>
  </div>
</header>

<main class="main">
  <!-- STATS -->
  <div class="stats-row" id="statsGrid"></div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16a6.471 6.471 0 004.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search anything…" oninput="renderTable()">
    </div>
    <select class="filter-select" id="statusFilter" onchange="renderTable()">
      <option value="">All Status</option>
      <option>Deployed</option><option>Spare</option><option>Retired</option>
      <option>Under Repair</option><option>Lost</option>
    </select>
    <select class="filter-select" id="siteFilter" onchange="renderTable()">
      <option value="">All Sites</option>
    </select>
  </div>

  <div class="count-bar"><span id="recordCount">0 records</span></div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th onclick="sortBy('brand')">Brand</th>
        <th onclick="sortBy('model')">Model</th>
        <th onclick="sortBy('serialNumber')">Serial No.</th>
        <th onclick="sortBy('assetTag')">Asset Tag</th>
        <th onclick="sortBy('po')">PO #</th>
        <th onclick="sortBy('processor')">Processor</th>
        <th onclick="sortBy('ram')">RAM</th>
        <th onclick="sortBy('os')">OS</th>
        <th onclick="sortBy('siteLocation')">Site</th>
        <th onclick="sortBy('assetStatus')">Status</th>
        <th onclick="sortBy('currentOwner')">Owner</th>
        <th onclick="sortBy('dateAdded')">Date Added</th>
        <th onclick="sortBy('dateModified')">Modified</th>
        <th class="no-sort">Actions</th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</main>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add Laptop</span>
      <button class="modal-close" onclick="closeFormModal()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="date-strip" id="dateStrip" style="display:none;">
        <div class="date-strip-item"><span class="date-strip-label">Date Added</span><span class="date-strip-value" id="ds_dateAdded">—</span></div>
        <div class="date-strip-item"><span class="date-strip-label">Last Modified</span><span class="date-strip-value" id="ds_dateModified">—</span></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Brand</label>
          <select class="form-select" id="f_brand">
            <option value="">Select Brand</option>
            <option>Acer</option><option>Apple</option><option>Asus</option>
            <option>Dell</option><option>HP</option><option>Lenovo</option>
            <option>Microsoft</option><option>MSI</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Model</label>
          <input type="text" class="form-input" id="f_model" placeholder="e.g. Latitude 5530">
        </div>
        <div class="form-group"><label class="form-label">Serial Number</label>
          <input type="text" class="form-input" id="f_serialNumber" placeholder="e.g. ABC123XYZ">
        </div>
        <div class="form-group"><label class="form-label">Asset Tag</label>
          <input type="text" class="form-input" id="f_assetTag" placeholder="e.g. OP360-LT-0001">
        </div>
        <div class="form-group"><label class="form-label">PO #</label>
          <input type="text" class="form-input" id="f_po" placeholder="e.g. PO-2024-001">
        </div>
        <div class="form-group"><label class="form-label">Processor</label>
          <select class="form-select" id="f_processor">
            <option value="">Select Processor</option>
            <option>Apple M1</option><option>Apple M2</option><option>Apple M3</option>
            <option>Apple M4</option><option>Apple M5</option>
            <option>Intel Core i3</option><option>Intel Core i5</option>
            <option>Intel Core i7</option><option>Intel Core i9</option>
            <option>Ryzen 3</option><option>Ryzen 5</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">RAM</label>
          <input type="text" class="form-input" id="f_ram" placeholder="e.g. 16GB DDR4">
        </div>
        <div class="form-group"><label class="form-label">Operating System</label>
          <select class="form-select" id="f_os">
            <option value="">Select OS</option>
            <option>ChromeOS</option><option>Linux</option><option>macOS</option>
            <option>Windows 10</option><option>Windows 11</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Site Location</label>
          <select class="form-select" id="f_siteLocation">
            <option value="">Select Site</option>
            <option>DMD</option><option>EB2</option><option>EB3</option><option>SDP</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Asset Status</label>
          <select class="form-select" id="f_assetStatus">
            <option value="">Select Status</option>
            <option>Deployed</option><option>Spare</option><option>Retired</option>
            <option>Under Repair</option><option>Lost</option>
          </select>
        </div>
        <div class="form-group full"><label class="form-label">Current Owner</label>
          <input type="text" class="form-input" id="f_currentOwner" placeholder="e.g. Juan Dela Cruz">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeFormModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRecord()">Save Record</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="overlay" id="deleteOverlay">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <span class="modal-title">Delete Record</span>
      <button class="modal-close" onclick="closeDeleteModal()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-body"><p id="deleteMsg" style="color:var(--text2);font-size:13px;line-height:1.7;"></p></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="overlay" id="importOverlay">
  <div class="modal" style="max-width:460px;">
    <div class="modal-header">
      <span class="modal-title">Import Inventory</span>
      <button class="modal-close" onclick="closeImportModal()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <label class="import-area" onclick="document.getElementById('importFile').click()">
        <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
        <p style="font-weight:500;margin-bottom:3px;font-size:13px;">Click to select a file</p>
        <p style="font-size:11px;">Supports CSV and JSON from this app</p>
        <input type="file" id="importFile" accept=".csv,.json" onchange="handleImport(this)">
      </label>
      <p style="font-size:11px;color:var(--text3);text-align:center;">
        ⚠ Importing <strong style="color:var(--amber);">replaces</strong> all current records. Export a backup first.
      </p>
    </div>
    <div class="modal-footer"><button class="btn" onclick="closeImportModal()">Cancel</button></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-dot" id="toastDot"></div>
  <span id="toastMsg"></span>
</div>

<script>
const STORAGE_KEY = 'laptopAssets_v1';
const THEME_KEY   = 'laptopAssets_theme';
let records=[], editId=null, deleteId=null, sortCol='dateAdded', sortDir=-1;

const FIELDS=[
  {key:'brand',label:'Brand'},{key:'model',label:'Model'},
  {key:'serialNumber',label:'Serial Number'},{key:'assetTag',label:'Asset Tag'},
  {key:'po',label:'PO #'},{key:'processor',label:'Processor'},
  {key:'ram',label:'RAM'},{key:'os',label:'Operating System'},
  {key:'siteLocation',label:'Site Location'},{key:'assetStatus',label:'Asset Status'},
  {key:'currentOwner',label:'Current Owner'}
];
const COL_KEYS=[...FIELDS.map(f=>f.key),'dateAdded','dateModified'];
const EXPORT_FIELDS=[...FIELDS,{key:'dateAdded',label:'Date Added'},{key:'dateModified',label:'Date Modified'}];

/* THEME */
function toggleTheme(){
  const next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem(THEME_KEY,next);
  document.getElementById('themeLabel').textContent=next==='dark'?'Dark':'Light';
}
function loadTheme(){
  const s=localStorage.getItem(THEME_KEY)||'light';
  document.documentElement.setAttribute('data-theme',s);
  document.getElementById('themeLabel').textContent=s==='dark'?'Dark':'Light';
}

/* DATA */
function load(){ try{ records=JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; }catch{ records=[]; } }
function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(records)); }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* DATES */
function nowISO(){ return new Date().toISOString(); }
function fmtDate(iso){
  if(!iso) return '—';
  const d=new Date(iso), p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

/* BADGE */
function statusBadge(s){
  const m={Deployed:'badge-deploy',Spare:'badge-spare',Retired:'badge-retire','Under Repair':'badge-repair',Lost:'badge-lost'};
  return `<span class="badge ${m[s]||'badge-retire'}">${s||'—'}</span>`;
}

/* STATS */
function renderStats(){
  const c={total:records.length,Deployed:0,Spare:0,Retired:0,'Under Repair':0,Lost:0};
  records.forEach(r=>{if(c[r.assetStatus]!==undefined)c[r.assetStatus]++;});
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-lbl">Total</div><div class="stat-val c-total">${c.total}</div></div>
    <div class="stat-card"><div class="stat-lbl">Deployed</div><div class="stat-val c-deploy">${c.Deployed}</div></div>
    <div class="stat-card"><div class="stat-lbl">Spare</div><div class="stat-val c-spare">${c.Spare}</div></div>
    <div class="stat-card"><div class="stat-lbl">Repair</div><div class="stat-val c-repair">${c['Under Repair']}</div></div>
    <div class="stat-card"><div class="stat-lbl">Retired</div><div class="stat-val c-retire">${c.Retired}</div></div>
    <div class="stat-card"><div class="stat-lbl">Lost</div><div class="stat-val c-lost">${c.Lost}</div></div>`;
}

/* SITE FILTER */
function updateSiteFilter(){
  const sites=[...new Set(records.map(r=>r.siteLocation).filter(Boolean))].sort();
  const sel=document.getElementById('siteFilter'),cur=sel.value;
  sel.innerHTML='<option value="">All Sites</option>'+sites.map(s=>`<option${s===cur?' selected':''}>${s}</option>`).join('');
}

/* TABLE */
function renderTable(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const sf=document.getElementById('statusFilter').value;
  const lf=document.getElementById('siteFilter').value;
  let filtered=records.filter(r=>
    (!sf||r.assetStatus===sf)&&(!lf||r.siteLocation===lf)&&
    (!q||[...FIELDS.map(f=>r[f.key]||''),fmtDate(r.dateAdded),fmtDate(r.dateModified)].some(v=>v.toLowerCase().includes(q)))
  );
  filtered.sort((a,b)=>{
    let av=a[sortCol]||'',bv=b[sortCol]||'';
    if(sortCol!=='dateAdded'&&sortCol!=='dateModified'){av=av.toLowerCase();bv=bv.toLowerCase();}
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  document.getElementById('recordCount').textContent=`${filtered.length} of ${records.length} records`;
  document.querySelectorAll('thead th').forEach((th,i)=>{
    if(i===13){th.className='no-sort';return;}
    th.className=COL_KEYS[i]===sortCol?(sortDir===1?'sort-asc':'sort-desc'):'';
  });
  const tbody=document.getElementById('tableBody');
  if(!filtered.length){
    tbody.innerHTML=`<tr><td colspan="14"><div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.07-.44.18-.86.18-1a3 3 0 00-6 0c0 .14.11.56.18 1H10c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-1c0-.55.45-1 1-1s1 .45 1 1-.45 1-1 1-1-.45-1-1z"/></svg>
      <p>${records.length===0?'No records yet. Click "Add Laptop" to get started.':'No records match your search.'}</p>
    </div></td></tr>`;
    return;
  }
  tbody.innerHTML=filtered.map(r=>`<tr>
    <td>${r.brand||'—'}</td><td>${r.model||'—'}</td>
    <td class="mono">${r.serialNumber||'—'}</td>
    <td class="mono">${r.assetTag||'—'}</td>
    <td class="mono">${r.po||'—'}</td>
    <td>${r.processor||'—'}</td>
    <td>${r.ram||'—'}</td>
    <td>${r.os||'—'}</td>
    <td>${r.siteLocation||'—'}</td>
    <td>${statusBadge(r.assetStatus)}</td>
    <td>${r.currentOwner||'—'}</td>
    <td class="date-cell">${fmtDate(r.dateAdded)}</td>
    <td class="date-cell">${fmtDate(r.dateModified)}</td>
    <td><div class="row-actions">
      <button class="btn btn-sm" onclick="openEditModal('${r.id}')">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="openDeleteModal('${r.id}')">Delete</button>
    </div></td>
  </tr>`).join('');
}

function render(){ renderStats(); updateSiteFilter(); renderTable(); }
function sortBy(col){ sortCol===col?sortDir*=-1:(sortCol=col,sortDir=1); renderTable(); }

/* FORM MODAL */
function openAddModal(){
  editId=null;
  document.getElementById('modalTitle').textContent='Add Laptop';
  document.getElementById('dateStrip').style.display='none';
  FIELDS.forEach(f=>{const el=document.getElementById('f_'+f.key);if(el)el.value='';});
  document.getElementById('formOverlay').classList.add('open');
}
function openEditModal(id){
  const rec=records.find(r=>r.id===id);if(!rec)return;
  editId=id;
  document.getElementById('modalTitle').textContent='Edit Laptop';
  FIELDS.forEach(f=>{const el=document.getElementById('f_'+f.key);if(el)el.value=rec[f.key]||'';});
  document.getElementById('dateStrip').style.display='flex';
  document.getElementById('ds_dateAdded').textContent=fmtDate(rec.dateAdded);
  document.getElementById('ds_dateModified').textContent=fmtDate(rec.dateModified)||'Never modified';
  document.getElementById('formOverlay').classList.add('open');
}
function closeFormModal(){ document.getElementById('formOverlay').classList.remove('open'); }

function saveRecord(){
  const rec={};
  FIELDS.forEach(f=>{rec[f.key]=(document.getElementById('f_'+f.key)?.value||'').trim();});
  if(!rec.brand&&!rec.serialNumber&&!rec.assetTag){showToast('Fill in at least Brand, Serial Number, or Asset Tag.',true);return;}
  const now=nowISO();
  if(editId){
    const i=records.findIndex(r=>r.id===editId);
    if(i>-1)records[i]={...records[i],...rec,dateModified:now};
    showToast('Record updated.');
  }else{
    rec.id=genId();rec.dateAdded=now;rec.dateModified=null;
    records.push(rec);showToast('Laptop added to inventory.');
  }
  save();render();closeFormModal();
}

/* DELETE */
function openDeleteModal(id){
  deleteId=id;const r=records.find(x=>x.id===id);
  document.getElementById('deleteMsg').innerHTML=
    `Are you sure you want to delete <strong style="color:var(--red)">${r?.brand||''} ${r?.model||''}</strong> (${r?.assetTag||r?.serialNumber||'no tag'})? This cannot be undone.`;
  document.getElementById('deleteOverlay').classList.add('open');
}
function closeDeleteModal(){ document.getElementById('deleteOverlay').classList.remove('open'); }
function confirmDelete(){ records=records.filter(r=>r.id!==deleteId);save();render();closeDeleteModal();showToast('Record deleted.'); }

/* IMPORT */
function openImportModal(){ document.getElementById('importOverlay').classList.add('open'); }
function closeImportModal(){ document.getElementById('importOverlay').classList.remove('open'); }
function handleImport(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      if(file.name.endsWith('.json')){
        const d=JSON.parse(e.target.result);
        records=(Array.isArray(d)?d:[]).map(r=>({id:r.id||genId(),...r}));
      }else{
        const lines=e.target.result.trim().split('\n');
        const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
        const km={};EXPORT_FIELDS.forEach(f=>{const i=headers.indexOf(f.label);if(i>-1)km[f.key]=i;});
        records=lines.slice(1).filter(l=>l.trim()).map(line=>{
          const cols=parseCSVLine(line);const rec={id:genId()};
          Object.entries(km).forEach(([k,i])=>{rec[k]=(cols[i]||'').trim()||null;});return rec;
        });
      }
      save();render();closeImportModal();input.value='';
      showToast(`Imported ${records.length} records.`);
    }catch{showToast('Import failed. Check file format.',true);}
  };
  reader.readAsText(file);
}
function parseCSVLine(line){
  const r=[];let c='',q=false;
  for(const ch of line){if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}
  r.push(c);return r;
}

/* EXPORT */
function exportCSV(){
  if(!records.length){showToast('No records to export.',true);return;}
  const hdr=EXPORT_FIELDS.map(f=>f.label).join(',');
  const rows=records.map(r=>EXPORT_FIELDS.map(f=>`"${(r[f.key]||'').replace(/"/g,'""')}"`).join(','));
  dl('laptop-inventory.csv',[hdr,...rows].join('\n'),'text/csv');
  showToast(`Exported ${records.length} records as CSV.`);
}
function exportJSON(){
  if(!records.length){showToast('No records to export.',true);return;}
  dl('laptop-inventory.json',JSON.stringify(records,null,2),'application/json');
  showToast(`Exported ${records.length} records as JSON.`);
}
function dl(name,content,type){
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([content],{type})),download:name});
  a.click();URL.revokeObjectURL(a.href);
}

/* TOAST */
let toastTimer;
function showToast(msg,isErr=false){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toastDot').className='toast-dot'+(isErr?' err':'');
  t.classList.add('show');clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

document.querySelectorAll('.overlay').forEach(ov=>
  ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open');})
);

loadTheme();load();render();
</script>
</body>
</html>
